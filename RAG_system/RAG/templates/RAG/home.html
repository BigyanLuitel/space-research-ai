{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Research AI</title>
    <link rel="stylesheet" href="{% static 'CSS/home.css' %}">
</head>
<body>
    <div class="upload">
        <h2>Space Research AI</h2>
        <form id="upload-form" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" id="file-input" name="document" accept=".pdf,.csv">
            <button type="submit" id="upload-btn">Upload Document</button>
            <p class="file-hint" id="file-hint"></p>
        </form>

    <div id="chat-container" style="display:none;">
        <div class="chat-header">
            <span id="pdf-label"></span>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="userMessage" placeholder="Ask a question...">
            <button id="send">Send</button>
        </div>
    </div>

    <script src="{% static 'JS/home.js' %}"></script>
</body>
</html>
